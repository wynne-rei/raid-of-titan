function mcMat(color) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05, flatShading: true });
}
function mcMatEmit(color, emissive, intensity = 0.8) {
  return new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: intensity, roughness: 0.3, flatShading: true });
}
function mcBox(w, h, d, color) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mcMat(color));
  m.castShadow = true; m.receiveShadow = true; return m;
}
function mcBoxE(w, h, d, color, emissive, intensity) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mcMatEmit(color, emissive, intensity));
  m.castShadow = true; return m;
}
function at(mesh, x, y, z) { mesh.position.set(x, y, z); return mesh; }

  c.width = 300; c.height = 80;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.roundRect(0, 0, 300, 80, 10);
  ctx.fill();
  const lines = d.label.split('\n');
  ctx.fillStyle = '#f4e6b8';
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(lines[0], 150, 30);
  if (lines[1]) {
    ctx.fillStyle = lines[1].includes('⚔') ? '#ff6666' : lines[1].includes('🛡') ? '#6688ff' : '#aaa';
    ctx.font = '18px sans-serif';
    ctx.fillText(lines[1], 150, 60);
  }

  spr.scale.set(14, 4, 1);

// Section labels
function addSectionLabel(text, x, z, y = 30) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f4e6b8';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 44);
  const tex = new THREE.CanvasTexture(c);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  spr.scale.set(28, 3.5, 1);
  spr.position.set(x, y, z);
  scene.add(spr);
}
addSectionLabel('─── 兵士ユニット（前列） ───', -4, 8, 30);
addSectionLabel('─── 兵士ユニット（後列） ───', -5, -14, 30);
addSectionLabel('─── 建物 ＆ 施設 ───', 3, -36, 30);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  allUnits.forEach(u => {
    u.children.forEach(c => {
      const sw = Math.sin(t * 4) * 0.6;
      if (c.name === 'armL') c.rotation.x = sw;
      if (c.name === 'armR') c.rotation.x = -sw;
      if (c.name === 'legL') c.rotation.x = -sw;
      if (c.name === 'legR') c.rotation.x = sw;
      if (c.name === 'wingL') c.rotation.z = 0.2 + Math.sin(t*6)*0.4;
      if (c.name === 'wingR') c.rotation.z = -0.2 - Math.sin(t*6)*0.4;
      if (c.name === 'orb' || c.name === 'altarOrb') c.material.emissiveIntensity = 0.5 + Math.sin(t*3)*0.4;
      if (c.name === 'flame') { c.material.emissiveIntensity = 0.8 + Math.sin(t*5)*0.4; c.rotation.y = t*2; }
    });
  });
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
